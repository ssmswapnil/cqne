<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CQNE — Quantum Network Control</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#06080d;--bg-panel:#0c1018;--bg-card:#111620;--border:#1c2535;--border-accent:#243044;--text-primary:#d8dee9;--text-muted:#5e6b82;--text-dim:#3a4458;--cyan:#22d3ee;--cyan-dim:#0e7490;--cyan-glow:#22d3ee30;--emerald:#34d399;--emerald-dim:#065f46;--amber:#fbbf24;--rose:#fb7185;--violet:#a78bfa;--font-mono:'JetBrains Mono','SF Mono',monospace;--font-sans:'DM Sans',-apple-system,sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-sans);background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}
.hdr{padding:20px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:relative}.hdr::after{content:'';position:absolute;bottom:-1px;left:32px;right:32px;height:1px;background:linear-gradient(90deg,transparent,var(--cyan-glow),transparent)}.hdr-left{display:flex;align-items:center;gap:16px}.hdr-logo{font-family:var(--font-mono);font-size:13px;font-weight:600;letter-spacing:3px;color:var(--cyan);text-transform:uppercase}.hdr-logo span{color:var(--text-dim);font-weight:400}.hdr-divider{width:1px;height:20px;background:var(--border)}.hdr-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:0.5px}.hdr-status{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.5px}.hdr-status .dot{width:6px;height:6px;border-radius:50%}.hdr-status .dot.on{background:var(--emerald);box-shadow:0 0 8px var(--emerald);animation:pulse 2s ease-in-out infinite}.hdr-status .dot.off{background:var(--rose)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.layout{display:grid;grid-template-columns:340px 1fr;grid-template-rows:auto 1fr;min-height:calc(100vh - 65px)}.sidebar{grid-row:1/-1;border-right:1px solid var(--border);background:var(--bg-panel);display:flex;flex-direction:column;overflow-y:auto}.sb-section{padding:12px 20px;border-bottom:1px solid var(--border)}.sb-section:last-child{border-bottom:none;flex:1;display:flex;flex-direction:column}.sb-title{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px}
.ncard{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;align-items:center;gap:8px}.ncard .indicator{width:7px;height:7px;border-radius:50%;flex-shrink:0}.ncard .indicator.on{background:var(--emerald);box-shadow:0 0 5px rgba(52,211,153,0.4)}.ncard .indicator.off{background:var(--rose)}.ncard-info{flex:1;min-width:0}.ncard-name{font-family:var(--font-mono);font-size:11px;font-weight:500}.ncard-url{font-size:9px;color:var(--text-dim);font-family:var(--font-mono)}.ncard-badge{font-family:var(--font-mono);font-size:8px;letter-spacing:1px;padding:2px 6px;border-radius:3px;text-transform:uppercase;font-weight:600}.ncard-badge.on{background:rgba(52,211,153,0.1);color:var(--emerald)}.ncard-badge.off{background:rgba(251,113,133,0.1);color:var(--rose)}
.ctrl-row{display:flex;gap:5px;margin-bottom:6px;align-items:center}.ctrl-sel{flex:1;padding:6px 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-mono);font-size:10px;outline:none;cursor:pointer}.ctrl-label{font-size:9px;color:var(--text-dim);font-family:var(--font-mono);padding:0 2px}.ctrl-btns{display:grid;grid-template-columns:1fr 1fr;gap:4px}.ctrl-btn{padding:7px;border-radius:5px;border:1px solid var(--border);font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}.ctrl-btn:hover{transform:translateY(-1px)}.ctrl-btn.ent{background:rgba(34,211,238,0.08);border-color:var(--cyan-dim);color:var(--cyan)}.ctrl-btn.tel{background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.3);color:var(--violet)}.ctrl-btn.ghz{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.25);color:var(--amber)}.ctrl-btn.rst{background:rgba(251,113,133,0.06);border-color:rgba(251,113,133,0.2);color:var(--rose)}.ctrl-btn.route{background:rgba(52,211,153,0.08);border-color:var(--emerald-dim);color:var(--emerald)}
.tag{font-family:var(--font-mono);font-size:9px;padding:3px 8px;border-radius:3px;letter-spacing:0.5px;display:inline-block;margin:0 3px 4px 0}.tag.mesh{background:rgba(34,211,238,0.1);color:var(--cyan)}.tag.custom{background:rgba(251,191,36,0.1);color:var(--amber)}.tag.sp{background:rgba(167,139,250,0.1);color:var(--violet)}.tag.mf{background:rgba(52,211,153,0.1);color:var(--emerald)}.tag.noise-on{background:rgba(251,113,133,0.1);color:var(--rose)}.tag.noise-off{background:rgba(52,211,153,0.05);color:var(--text-dim)}
.slider-row{display:flex;align-items:center;gap:6px;margin:4px 0}.slider-row label{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);min-width:50px}.slider-row input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none}.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--cyan);cursor:pointer}.slider-row .val{font-family:var(--font-mono);font-size:10px;color:var(--cyan);min-width:36px;text-align:right}
.main-top{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}.metric{background:var(--bg-panel);padding:14px 10px;text-align:center}.metric-val{font-family:var(--font-mono);font-size:24px;font-weight:600;line-height:1}.metric-val.c1{color:var(--cyan)}.metric-val.c2{color:var(--emerald)}.metric-val.c3{color:var(--amber)}.metric-val.c4{color:var(--violet)}.metric-val.c5{color:var(--rose)}.metric-lbl{font-family:var(--font-mono);font-size:7px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-top:5px}
.main-body{display:grid;grid-template-columns:1fr 1fr;flex:1}.main-body>div{border-right:1px solid var(--border)}.main-body>div:last-child{border-right:none}.panel{display:flex;flex-direction:column}.panel-hdr{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.panel-title{font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}.panel-body{flex:1;padding:12px;overflow-y:auto}
#topo-svg{width:100%;height:100%;min-height:320px}.topo-link-bg{stroke:var(--border);stroke-width:1}.topo-link-topo{stroke:var(--emerald);stroke-width:1;opacity:0.4;stroke-dasharray:4 4}.topo-node-ring{fill:none;stroke-width:2}.topo-node-core{opacity:0.15}.topo-node-label{fill:var(--text-primary);font-family:var(--font-mono);font-size:14px;font-weight:600;text-anchor:middle;dominant-baseline:central}.topo-node-sub{fill:var(--text-muted);font-family:var(--font-mono);font-size:9px;text-anchor:middle;letter-spacing:1px}.topo-router-ring{fill:none;stroke:var(--text-dim);stroke-width:1;stroke-dasharray:3 3}.topo-router-label{fill:var(--text-dim);font-family:var(--font-mono);font-size:8px;font-weight:600;text-anchor:middle;letter-spacing:2px}.topo-fidelity{font-family:var(--font-mono);font-size:9px;text-anchor:middle;dominant-baseline:central}
#log{font-family:var(--font-mono);font-size:10px;line-height:1.9}.log-entry{display:flex;gap:8px;padding:1px 0}.log-time{color:var(--text-dim);white-space:nowrap;min-width:62px}.log-msg{flex:1}.log-msg.ok{color:var(--emerald)}.log-msg.err{color:var(--rose)}.log-msg.info{color:var(--cyan)}.log-msg.warn{color:var(--amber)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{grid-row:auto;border-right:none;border-bottom:1px solid var(--border)}.main-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left"><div class="hdr-logo">CQNE <span>v2.5</span></div><div class="hdr-divider"></div><div class="hdr-subtitle">Campus quantum network emulator</div></div>
  <div class="hdr-status" id="conn-status"><div class="dot on"></div><span style="color:var(--emerald)">LIVE</span></div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-section"><div class="sb-title">Nodes</div><div id="node-list"></div></div>
    <div class="sb-section">
      <div class="sb-title">Experiments</div>
      <div class="ctrl-row"><select class="ctrl-sel" id="sel-a"></select><div class="ctrl-label">&#x2194;</div><select class="ctrl-sel" id="sel-b"></select></div>
      <div class="ctrl-btns">
        <button class="ctrl-btn ent" onclick="runEntangle()">Entangle</button>
        <button class="ctrl-btn tel" onclick="runTeleport()">Teleport</button>
        <button class="ctrl-btn ghz" onclick="runGHZ()">GHZ state</button>
        <button class="ctrl-btn rst" onclick="resetState()">Reset qubits</button>
        <button class="ctrl-btn rst" onclick="clearHistory()" style="grid-column:1/-1;font-size:8px;padding:5px">Clear experiment history</button>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-title">YAML experiments</div>
      <select class="ctrl-sel" id="yaml-sel" style="margin-bottom:6px"><option value="">Select template...</option></select>
      <div class="ctrl-btns"><button class="ctrl-btn route" onclick="runYAML()" style="grid-column:1/-1">Run template</button></div>
      <div id="yaml-status" style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:6px"></div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Routing</div>
      <div id="topo-tags"></div>
      <div class="ctrl-btns" style="margin-top:4px">
        <button class="ctrl-btn route" onclick="setLinearTopo()">Linear A-B-C</button>
        <button class="ctrl-btn route" onclick="setFullMesh()">Full mesh</button>
        <button class="ctrl-btn route" onclick="setStrategy('shortest_path')">Shortest path</button>
        <button class="ctrl-btn route" onclick="setStrategy('max_fidelity')">Max fidelity</button>
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Noise &amp; decoherence</div>
      <div class="slider-row"><label>Gate err</label><input type="range" id="noise-gate" min="0" max="100" value="0" oninput="updateNoiseLabel()"><span class="val" id="noise-gate-val">0.000</span></div>
      <div class="slider-row"><label>Dephase</label><input type="range" id="noise-deph" min="0" max="100" value="0" oninput="updateNoiseLabel()"><span class="val" id="noise-deph-val">0.000</span></div>
      <div class="slider-row"><label>Decoh.</label><input type="range" id="deco-slider" min="0" max="100" value="10" oninput="updateNoiseLabel()"><span class="val" id="deco-val">0.010</span></div>
      <button class="ctrl-btn route" style="width:100%;margin-top:5px" onclick="applyNoise()">Apply all</button>
      <div id="noise-info" style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:6px"></div>
    </div>
    <div class="sb-section"><div class="sb-title">Event log</div><div id="log" style="flex:1;overflow-y:auto;max-height:160px"></div></div>
  </div>
  <div class="main-top">
    <div class="metric"><div class="metric-val c1" id="s-nodes">0</div><div class="metric-lbl">Nodes</div></div>
    <div class="metric"><div class="metric-val c2" id="s-qubits">0</div><div class="metric-lbl">Qubits</div></div>
    <div class="metric"><div class="metric-val c3" id="s-links">0</div><div class="metric-lbl">Active pairs</div></div>
    <div class="metric"><div class="metric-val c4" id="s-exps">0</div><div class="metric-lbl">Experiments</div></div>
    <div class="metric"><div class="metric-val c5" id="s-mode">-</div><div class="metric-lbl">Topology</div></div>
  </div>
  <div class="main-body">
    <div class="panel"><div class="panel-hdr"><div class="panel-title">Network topology</div></div><div class="panel-body" style="padding:0"><svg id="topo-svg" viewBox="0 0 500 380"></svg></div></div>
    <div class="panel"><div class="panel-hdr"><div class="panel-title">Experiment history</div></div><div class="panel-body" id="history" style="overflow-y:auto"></div></div>
  </div>
</div>
<script>
const API='';
let nodes=[],links=[],aliveLinks=[],expHistory=[],topoMode='full_mesh',customTopo=null,routeStrategy='shortest_path',decoConfig={},noiseConfig={};
async function get(p){return(await fetch(API+p)).json()}
async function post(p,b={}){const r=await fetch(API+p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const d=await r.json();if(!r.ok)throw new Error(d.detail||'Server error');return d}
function log(msg,cls='info'){const el=document.getElementById('log');const t=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});el.innerHTML='<div class="log-entry"><span class="log-time">'+t+'</span><span class="log-msg '+cls+'">'+msg+'</span></div>'+el.innerHTML}
function updateNoiseLabel(){document.getElementById('noise-gate-val').textContent=(document.getElementById('noise-gate').value/1000).toFixed(3);document.getElementById('noise-deph-val').textContent=(document.getElementById('noise-deph').value/1000).toFixed(3);document.getElementById('deco-val').textContent=(document.getElementById('deco-slider').value/1000).toFixed(3)}
function updateDropdowns(){const online=nodes.filter(n=>n.online).map(n=>n.node_id);['sel-a','sel-b'].forEach(id=>{const s=document.getElementById(id);const prev=s.value;s.innerHTML=online.map(n=>'<option value="'+n+'">'+n+'</option>').join('');if(online.includes(prev))s.value=prev});const sB=document.getElementById('sel-b');if(online.length>=2&&document.getElementById('sel-a').value===sB.value)sB.value=online.find(n=>n!==document.getElementById('sel-a').value)||online[1]}
function renderNodes(){const el=document.getElementById('node-list');if(!nodes.length){el.innerHTML='<div style="color:var(--text-dim);font-size:10px;padding:6px">Waiting for nodes...</div>';return}el.innerHTML=nodes.map(n=>'<div class="ncard"><div class="indicator '+(n.online?'on':'off')+'"></div><div class="ncard-info"><div class="ncard-name">'+n.node_id+'</div><div class="ncard-url">'+n.url+'</div></div><div class="ncard-badge '+(n.online?'on':'off')+'">'+(n.online?'online':'offline')+'</div></div>').join('')}
function fidelityColor(f){if(f>0.8)return'var(--emerald)';if(f>0.6)return'var(--amber)';return'var(--rose)'}
function renderTopology(){const svg=document.getElementById('topo-svg');if(!nodes.length){svg.innerHTML='<text x="250" y="190" fill="var(--text-dim)" font-family="var(--font-mono)" font-size="12" text-anchor="middle">No nodes registered</text>';return}const cx=250,cy=180,r=110,pos={};let h='<defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';for(let x=0;x<=500;x+=50)h+='<line x1="'+x+'" y1="0" x2="'+x+'" y2="380" stroke="var(--border)" stroke-width="0.3" opacity="0.4"/>';for(let y=0;y<=380;y+=50)h+='<line x1="0" y1="'+y+'" x2="500" y2="'+y+'" stroke="var(--border)" stroke-width="0.3" opacity="0.4"/>';nodes.forEach((n,i)=>{const a=(i/nodes.length)*Math.PI*2-Math.PI/2;pos[n.node_id]={x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}});h+='<circle cx="'+cx+'" cy="'+cy+'" r="20" class="topo-router-ring"/><text x="'+cx+'" y="'+(cy+1)+'" class="topo-router-label">ROUTER</text>';if(customTopo){const drawn=new Set();for(const[node,nbs]of Object.entries(customTopo)){for(const nb of nbs){const k=[node,nb].sort().join('-');if(!drawn.has(k)&&pos[node]&&pos[nb]){drawn.add(k);h+='<line x1="'+pos[node].x+'" y1="'+pos[node].y+'" x2="'+pos[nb].x+'" y2="'+pos[nb].y+'" class="topo-link-topo"/>'}}}}else{nodes.forEach(n=>{const p=pos[n.node_id];h+='<line x1="'+p.x+'" y1="'+p.y+'" x2="'+cx+'" y2="'+cy+'" class="topo-link-bg" opacity="'+(n.online?'0.5':'0.15')+'"/>'})}aliveLinks.forEach(l=>{const pa=pos[l.node_a],pb=pos[l.node_b];if(pa&&pb){const f=l.fidelity||0;const col=fidelityColor(f);h+='<line x1="'+pa.x+'" y1="'+pa.y+'" x2="'+pb.x+'" y2="'+pb.y+'" stroke="'+col+'" stroke-width="2" opacity="'+Math.max(0.3,f)+'" filter="url(#glow)"/>';const mx=(pa.x+pb.x)/2,my=(pa.y+pb.y)/2;h+='<text x="'+mx+'" y="'+(my-8)+'" class="topo-fidelity" fill="'+col+'">'+(f*100).toFixed(0)+'%</text>'}});const colors={node_a:'#22d3ee',node_b:'#a78bfa',node_c:'#fbbf24',node_d:'#34d399'};nodes.forEach(n=>{const p=pos[n.node_id],c=colors[n.node_id]||'#22d3ee',op=n.online?1:0.25,letter=n.node_id.replace('node_','').toUpperCase();h+='<g opacity="'+op+'"><circle cx="'+p.x+'" cy="'+p.y+'" r="28" fill="'+c+'" class="topo-node-core"/><circle cx="'+p.x+'" cy="'+p.y+'" r="28" class="topo-node-ring" stroke="'+c+'"/><text x="'+p.x+'" y="'+p.y+'" class="topo-node-label">'+letter+'</text><text x="'+p.x+'" y="'+(p.y+42)+'" class="topo-node-sub">'+n.node_id.toUpperCase()+'</text>';if(n.online)h+='<circle cx="'+(p.x+22)+'" cy="'+(p.y-22)+'" r="4" fill="var(--emerald)" filter="url(#glow)"/>';h+='</g>'});svg.innerHTML=h}
function renderStats(sum,qc){document.getElementById('s-nodes').textContent=nodes.filter(n=>n.online).length;document.getElementById('s-qubits').textContent=qc||0;document.getElementById('s-links').textContent=aliveLinks.length;document.getElementById('s-exps').textContent=sum.total||0;const m=document.getElementById('s-mode');m.textContent=topoMode==='custom'?'LINEAR':'MESH';m.style.fontSize='12px';const tags=document.getElementById('topo-tags');tags.innerHTML='<span class="tag '+(topoMode==='custom'?'custom':'mesh')+'">'+(topoMode==='custom'?'Linear':'Mesh')+'</span><span class="tag '+(routeStrategy==='max_fidelity'?'mf':'sp')+'">'+(routeStrategy==='max_fidelity'?'Max fidelity':'Shortest')+'</span><span class="tag '+(noiseConfig.noise_enabled?'noise-on':'noise-off')+'">'+(noiseConfig.noise_enabled?'Noisy':'Noiseless')+'</span><span class="tag mesh">SQLite</span>';const ni=document.getElementById('noise-info');let info='Deco: '+(decoConfig.decoherence_rate||0)+' | Active: '+(decoConfig.active_pairs||0)+' | Expired: '+(decoConfig.expired_pairs||0);if(noiseConfig.noise_enabled)info+='<br>Gate err: '+(noiseConfig.gate_error_rate||0)+' | Dephase: '+(noiseConfig.dephasing_rate||0)+' | Events: '+(noiseConfig.noise_events||0);ni.innerHTML=info}
function renderHistory(){const el=document.getElementById('history');if(!expHistory.length){el.innerHTML='<div style="color:var(--text-dim);font-family:var(--font-mono);font-size:10px">No experiments yet.</div>';return}el.innerHTML=expHistory.slice().reverse().map(e=>{const tc={entangle:'var(--cyan)',teleport:'var(--violet)',ghz:'var(--amber)'};const c=tc[e.type]||'var(--text-muted)';let detail='';if(e.error)detail='<span style="color:var(--rose)">Error: '+e.error+'</span>';else if(e.type==='teleport'){detail='m1='+e.m1+' m2='+e.m2+' result='+e.final_result;if(e.routed)detail+=' <span style="color:var(--amber)">['+e.path.join('\u2192')+' \u2014 '+e.hops+' hops]</span>';else detail+=' <span style="color:var(--text-dim)">[direct]</span>'}else if(e.type==='entangle'){detail=(e.qubit_a||'')+' \u2194 '+(e.qubit_b||'');if(e.fidelity!==undefined){const f=e.fidelity;detail+=' <span style="color:'+(f>0.95?'var(--emerald)':f>0.8?'var(--amber)':'var(--rose)')+'">F='+f.toFixed(3)+'</span>'}}else if(e.type==='ghz')detail=(e.nodes||[]).join(', ');return '<div style="padding:6px 0;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:10px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="color:'+c+';text-transform:uppercase;letter-spacing:1px;font-weight:600;font-size:9px">'+e.type+'</span><span style="color:var(--text-dim)">'+((e.duration_ms||0)).toFixed(0)+'ms</span></div><div style="color:var(--text-muted);line-height:1.5">'+detail+'</div><div style="color:var(--text-dim);font-size:8px;margin-top:1px">'+e.exp_id+'</div></div>'}).join('')}
async function poll(){try{const st=await get('/network/status');nodes=st.topology.nodes||[];links=st.links||[];aliveLinks=st.alive_links||[];topoMode=st.topology_mode||'full_mesh';customTopo=st.routing||null;routeStrategy=st.routing_strategy||'shortest_path';decoConfig=st.decoherence||{};noiseConfig=st.noise||{};const sum=await get('/experiment/summary');const res=await get('/experiment/results');expHistory=res.experiments||[];renderTopology();renderNodes();renderStats(sum,st.qubit_count);updateDropdowns();renderHistory();document.getElementById('conn-status').innerHTML='<div class="dot on"></div><span style="color:var(--emerald)">LIVE</span>'}catch(e){document.getElementById('conn-status').innerHTML='<div class="dot off"></div><span style="color:var(--rose)">OFFLINE</span>'}}
async function runEntangle(){const a=document.getElementById('sel-a').value,b=document.getElementById('sel-b').value;if(!a||!b){log('No nodes','err');return}if(a===b){log('Pick different nodes','err');return}log('Entangling '+a+' \u2194 '+b+'...','warn');try{const r=await post('/experiment/entangle',{node_a_id:a,node_b_id:b});log('Bell pair F='+r.fidelity.toFixed(3)+' ('+r.duration_ms+'ms)','ok');poll()}catch(e){log('Failed: '+e.message,'err')}}
async function runTeleport(){const a=document.getElementById('sel-a').value,b=document.getElementById('sel-b').value;if(!a||!b){log('No nodes','err');return}if(a===b){log('Pick different nodes','err');return}log('Teleporting '+a+' \u2192 '+b+'...','warn');try{const r=await post('/experiment/teleport',{source_node_id:a,target_node_id:b,shots:128});if(r.routed)log('Routed: '+r.path.join('\u2192')+' ('+r.hops+' hops, '+r.duration_ms+'ms)','ok');else log('Direct: m1='+r.m1+' m2='+r.m2+' ('+r.duration_ms+'ms)','ok');poll()}catch(e){log('Teleport failed: '+e.message,'err')}}
async function runGHZ(){const on=nodes.filter(n=>n.online).map(n=>n.node_id);if(on.length<2){log('Need 2+ nodes','err');return}log('GHZ '+on.join(', ')+'...','warn');try{const r=await post('/experiment/ghz',{node_ids:on});log(on.length+'-node GHZ ('+r.duration_ms+'ms)','ok');poll()}catch(e){log('GHZ failed: '+e.message,'err')}}
async function resetState(){await post('/quantum/reset');log('Qubits reset (history preserved)','info');poll()}
async function clearHistory(){if(!confirm('Clear all experiment history from the database?'))return;await post('/experiment/clear_history');log('History cleared','info');poll()}
async function setLinearTopo(){const on=nodes.filter(n=>n.online).map(n=>n.node_id).sort();if(on.length<3){log('Need 3+ nodes','err');return}const adj={};for(let i=0;i<on.length;i++){adj[on[i]]=[];if(i>0)adj[on[i]].push(on[i-1]);if(i<on.length-1)adj[on[i]].push(on[i+1])}await post('/routing/set_topology',{adjacency:adj});log('Linear: '+on.join('\u2014'),'info');poll()}
async function setFullMesh(){await post('/routing/clear_topology');log('Full mesh','info');poll()}
async function setStrategy(s){await post('/routing/set_strategy',{strategy:s});log('Strategy: '+s,'info');poll()}
async function applyNoise(){const ge=document.getElementById('noise-gate').value/1000;const dp=document.getElementById('noise-deph').value/1000;const dc=document.getElementById('deco-slider').value/1000;await post('/noise/set',{gate_error:ge,dephasing:dp});await post('/decoherence/set_rate',{rate:dc});log('Noise: gate='+ge.toFixed(3)+' deph='+dp.toFixed(3)+' deco='+dc.toFixed(3),'info');poll()}
async function loadYAMLTemplates(){try{const r=await get('/experiment/yaml/templates');const sel=document.getElementById('yaml-sel');sel.innerHTML='<option value="">Select template...</option>';(r.templates||[]).forEach(t=>{sel.innerHTML+='<option value="'+t.filename+'">'+t.name+' ('+t.steps+' steps)</option>'})}catch(e){}}
async function runYAML(){const fn=document.getElementById('yaml-sel').value;if(!fn){log('Select a YAML template','err');return}log('Running YAML: '+fn+'...','warn');document.getElementById('yaml-status').innerHTML='Running...';try{const r=await post('/experiment/yaml/run_template/'+fn);log('YAML done: '+r.name+' \u2014 '+r.completed_steps+' steps, '+r.error_count+' errors, '+r.duration_ms+'ms','ok');document.getElementById('yaml-status').innerHTML='Done: '+r.completed_steps+' steps, '+r.error_count+' errors, '+r.duration_ms+'ms';poll()}catch(e){log('YAML failed: '+e.message,'err');document.getElementById('yaml-status').innerHTML='Failed: '+e.message}}
loadYAMLTemplates();
poll();setInterval(poll,2000);log('Dashboard initialized','info');
</script>
</body>
</html>
